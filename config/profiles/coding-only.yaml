# Coding-only profile: maximum context for GLM-4.7-Flash, no second model.
#
# server.host is overwritten by the wrapper based on ~/.4lm/config/network.yaml.

server:
  host: "127.0.0.1"
  port: 8000

models:
  - model_path: mlx-community/GLM-4.7-Flash-8bit
    served_model_name: glm-4.7-flash
    model_type: lm
    enable_auto_tool_choice: true
    tool_call_parser: glm4_moe
    reasoning_parser: glm47_flash
    context_length: 200000
