# Default profile: Qwen3-Coder-Next (coding) + Gemma 4 31B Dense (chat/reasoning)
# via omlx backend.
#
# Both models load on demand and stay resident while memory permits.
# On 128 GB unified memory both models (~44 GB + ~18 GB) stay loaded
# simultaneously with ample headroom for KV cache.
#
# omlx fixes the RotatingKVCache / BatchRotatingKVCache bug that required
# Gemma 4 to run on ollama with mlx-openai-server.

backend: omlx

models:
  - model_path: mlx-community/Qwen3-Coder-Next-4bit
    served_model_name: qwen3-coder-next
    model_type: lm
    pin: true
    ttl: null

  - model_path: mlx-community/gemma-4-31b-it-4bit
    served_model_name: gemma4-31b
    model_type: lm
    pin: false
    ttl: 600
