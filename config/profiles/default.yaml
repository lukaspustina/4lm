# Default profile: full Qwen3 stack via omlx — coder + chat + RAG
# (embed + rerank) + on-demand vision.
#
# Coder pinned; chat / embed / rerank / vision load on demand and stay
# resident while memory permits. omlx evicts least-recently-used models
# under pressure.
#
# Resident-if-all-loaded: ~75 GB. Steady state (coder + chat + embed):
# ~65 GB on 110 GB usable VRAM — ample KV-cache headroom.

backend: omlx

models:
  - model_path: mlx-community/Qwen3-Coder-Next-4bit
    served_model_name: qwen3-coder-next
    model_type: lm
    pin: true
    ttl: null

  - model_path: mlx-community/Qwen3.6-35B-A3B-4bit
    served_model_name: qwen3.6-35b
    model_type: lm
    pin: false
    ttl: 600

  - model_path: mlx-community/Qwen3-Embedding-8B-4bit-DWQ
    served_model_name: qwen3-embedding
    model_type: lm
    pin: false
    ttl: 600

  - model_path: mlx-community/Qwen3-Reranker-0.6B-mxfp8
    served_model_name: qwen3-reranker
    model_type: lm
    pin: false
    ttl: 600

  - model_path: lmstudio-community/Qwen3-VL-8B-Instruct-MLX-8bit
    served_model_name: qwen3-vl-8b
    model_type: vlm
    pin: false
    ttl: 600
