# Default profile: Qwen3-Coder-30B-A3B (Build) + Qwen3.6-27B (Plan/Knowledge)
#
# Slot 1 + 2 loaded permanently. Slot 3 (gpt-oss-120b) loads on demand
# and unloads after on_demand_idle_timeout seconds idle.
#
# server.host is overwritten by the wrapper based on ~/.4lm/config/network.yaml.

server:
  host: "127.0.0.1"
  port: 8000

models:
  - model_path: mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit
    served_model_name: qwen3-coder-30b
    model_type: lm
    enable_auto_tool_choice: true
    tool_call_parser: qwen3_coder
    context_length: 65536
    default_max_tokens: 8192

  - model_path: mlx-community/Qwen3.6-27B-4bit
    served_model_name: qwen3.6-27b
    model_type: lm
    enable_auto_tool_choice: true
    tool_call_parser: qwen3
    chat_template_file: /Users/lukas/.4lm/config/qwen3-no-think.jinja
    context_length: 65536
    default_max_tokens: 8192

  - model_path: LibraxisAI/gpt-oss-120b-mlx-mxfp4
    served_model_name: gpt-oss-120b
    model_type: lm
    enable_auto_tool_choice: true
    tool_call_parser: harmony
    on_demand: true
    on_demand_idle_timeout: 300
    context_length: 32768
