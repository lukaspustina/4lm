# Default profile: Qwen3-Coder-Next (coding) + Gemma 4 31B Dense (chat/reasoning)
# via Ollama backend.
#
# Both models load on demand and stay resident while memory permits.
# On 128 GB unified memory both models (~52 GB + ~20 GB) stay loaded
# simultaneously with ample headroom for KV cache.
#
# Note: Gemma 4 requires ollama — the RotatingKVCache / sliding-window
# attention architecture is incompatible with mlx-openai-server and mlx_lm
# (GPU stream thread-local bug, upstream unresolved as of 2026-05).

backend: ollama

models:
  - model_path: qwen3-coder-next:q4_K_M
    served_model_name: qwen3-coder-next

  - model_path: gemma4:31b
    served_model_name: gemma4-31b
