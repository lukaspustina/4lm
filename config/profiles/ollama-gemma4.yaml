# Ollama backend profile: Gemma 4 26B
#
# backend: ollama tells 4lm to start ollama serve instead of
# mlx-openai-server. model_path is the Ollama pull tag. mlx-specific
# fields (model_type, tool_call_parser, context_length, on_demand) are
# absent — they are not required or used for Ollama profiles.
#
# Ollama exposes an OpenAI-compatible /v1/ endpoint on the same stable
# port (8000). No client reconfiguration required.

backend: ollama

models:
  - model_path: gemma4:26b
    served_model_name: gemma4-26b
