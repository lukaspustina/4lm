# EXPERIMENT: Qwen3-Coder-Next + Gemma 4 31B Dense via mlx-openai-server.
#
# Tracks fix for the RotatingKVCache / GPU stream thread-local bug that
# prevents Gemma 4 from generating tokens on mlx-openai-server. Coder-Next
# works; Gemma 4 is broken until upstream resolves the issue.
# Use default.yaml (ollama) for a working two-model setup in the meantime.
#
# server.host is overwritten by the wrapper based on ~/.4lm/config/network.yaml.

backend: mlx

server:
  host: "127.0.0.1"
  port: 8000

models:
  - model_path: mlx-community/Qwen3-Coder-Next-4bit
    served_model_name: qwen3-coder-next
    model_type: lm
    enable_auto_tool_choice: true
    tool_call_parser: qwen3_coder
    context_length: 32768
    default_max_tokens: 8192

  - model_path: mlx-community/gemma-4-31b-it-4bit
    served_model_name: gemma4-31b
    model_type: lm
    reasoning_parser: gemma4
    context_length: 131072
    default_max_tokens: 8192
