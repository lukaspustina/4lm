# Lean profile: lighter Qwen3 stack via omlx — 30B coder + chat + RAG
# (embed + rerank). No vision slot.
#
# For use when you want ~70 GB free RAM for other workloads (Xcode,
# Docker, browser, etc.) without losing core chat / coding / RAG.
# Switch to `default` when vision is needed.
#
# Resident-if-all-loaded: ~41 GB. Embedder matches default and
# max-100gb (Qwen3-Embedding-8B) so OpenWebUI knowledge bases stay
# valid across profile switches.

backend: omlx

models:
  - model_path: mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit
    served_model_name: qwen3-coder-30b
    model_type: lm
    pin: true
    ttl: null

  - model_path: mlx-community/Qwen3.6-35B-A3B-4bit
    served_model_name: qwen3.6-35b
    model_type: lm
    pin: false
    ttl: 600

  - model_path: mlx-community/Qwen3-Embedding-8B-4bit-DWQ
    served_model_name: qwen3-embedding
    model_type: lm
    pin: false
    ttl: 600

  - model_path: mlx-community/Qwen3-Reranker-0.6B-mxfp8
    served_model_name: qwen3-reranker
    model_type: lm
    pin: false
    ttl: 600
