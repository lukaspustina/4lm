name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        install_mode: [default, backend-only]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install tooling
        run: |
          brew bundle --file=Brewfile
          if [ "${{ matrix.install_mode }}" = "default" ]; then
            brew bundle --file=Brewfile-tui
          fi

      - name: Cache pip dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ github.workspace }}/.venv
          key: venv-${{ hashFiles('requirements-helpers.txt') }}

      - name: Set up helpers venv
        run: |
          python3.12 -m venv "${{ github.workspace }}/.venv"
          "${{ github.workspace }}/.venv/bin/pip" install --quiet -r requirements-helpers.txt

      - name: make check
        run: make check
        env:
          HELPERS_PYTHON: ${{ github.workspace }}/.venv/bin/python
          BACKEND_ONLY: ${{ matrix.install_mode == 'backend-only' && '1' || '' }}
